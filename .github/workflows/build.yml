name: Build

on:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Set version from release tag
        if: github.event_name == 'release'
        run: echo "CARD_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build
        run: npm run build

      - name: Upload release asset
        if: github.event_name == 'release'
        run: gh release upload ${{ github.ref_name }} dist/button-progress-card.js --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}